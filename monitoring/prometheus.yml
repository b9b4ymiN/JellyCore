global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: oracle
    metrics_path: /metrics
    static_configs:
      - targets:
          - oracle:47778

  - job_name: nanoclaw
    metrics_path: /metrics
    static_configs:
      - targets:
          - nanoclaw:47779

  - job_name: chromadb
    metrics_path: /api/v1/heartbeat
    static_configs:
      - targets:
          - chromadb:8000

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100
