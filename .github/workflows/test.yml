name: Test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  nanoclaw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nanoclaw/package-lock.json
      - name: Install NanoClaw deps
        working-directory: nanoclaw
        run: npm ci
      - name: Run NanoClaw tests
        working-directory: nanoclaw
        run: npm test
      - name: Build agent-runner TypeScript
        working-directory: nanoclaw/container/agent-runner
        run: |
          npm ci
          npm run build

  oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - name: Install Oracle deps
        working-directory: oracle-v2
        run: bun install --frozen-lockfile
      - name: Oracle HTTP integration
        working-directory: oracle-v2
        run: bun test src/integration/http.test.ts
      - name: Oracle memory + sqlite policy integration
        working-directory: oracle-v2
        run: bun test src/integration/decay.test.ts src/integration/procedural.test.ts src/integration/episodic.test.ts src/integration/user-model.test.ts src/integration/sqlite-policy.test.ts
      - name: Oracle frontend build
        working-directory: oracle-v2/frontend
        run: |
          bun install --frozen-lockfile
          bun run build

  thai_nlp_sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Thai sidecar deps
        run: |
          python -m pip install --upgrade pip
          pip install -r thai-nlp-sidecar/requirements.txt pytest pytest-cov
      - name: Run Thai sidecar tests + coverage gate
        working-directory: thai-nlp-sidecar
        run: |
          pytest tests \
            --cov=main \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -q

  agent_images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build full agent image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build --progress=plain \
            -f nanoclaw/container/Dockerfile \
            -t jellycore-agent:ci \
            nanoclaw/container
      - name: Build lite agent image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build --progress=plain \
            -f nanoclaw/container/Dockerfile.lite \
            -t jellycore-agent-lite:ci \
            nanoclaw/container
      - name: Report image sizes
        id: image_size
        run: |
          FULL_BYTES=$(docker image inspect jellycore-agent:ci --format '{{.Size}}')
          LITE_BYTES=$(docker image inspect jellycore-agent-lite:ci --format '{{.Size}}')
          FULL_MB=$((FULL_BYTES / 1024 / 1024))
          LITE_MB=$((LITE_BYTES / 1024 / 1024))
          echo "full_mb=${FULL_MB}" >> "$GITHUB_OUTPUT"
          echo "lite_mb=${LITE_MB}" >> "$GITHUB_OUTPUT"
          {
            echo "## Agent Image Size Report"
            echo ""
            echo "- full: ${FULL_MB} MB"
            echo "- lite: ${LITE_MB} MB"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Assert lite image budget (< 400MB)
        run: |
          if [ "${{ steps.image_size.outputs.lite_mb }}" -ge 400 ]; then
            echo "Lite image exceeds budget: ${{ steps.image_size.outputs.lite_mb }}MB"
            exit 1
          fi

  compose_validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.production.yml config -q
