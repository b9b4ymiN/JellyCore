# JellyCore Production Docker Compose
# Oracle V2 + ChromaDB + NanoClaw (AI orchestrator)
#
# Prerequisites:
#   1. Build the agent container image:
#      docker build -t nanoclaw-agent:latest -f nanoclaw/container/Dockerfile nanoclaw/container
#   2. Create .env file with required variables (see below)
#   3. Run:  docker compose -f docker-compose.production.yml up -d
#
# Required .env variables:
#   ANTHROPIC_API_KEY          - Z.AI API key (used as ANTHROPIC_AUTH_TOKEN)
#   TELEGRAM_BOT_TOKEN         - Telegram bot token
#   CHROMA_AUTH_TOKEN          - ChromaDB authentication token
#   ORACLE_AUTH_TOKEN          - Oracle API authentication token
#   JELLYCORE_AUTH_PASSPHRASE  - WhatsApp auth encryption key (only if WhatsApp enabled)
#   JELLYCORE_IPC_SECRET       - IPC integrity signing secret
#
# Optional:
#   ENABLED_CHANNELS           - Comma-separated: telegram,whatsapp (default: telegram)

services:
  # ========================================
  # ChromaDB - Vector Database for Semantic Search
  # ========================================
  # ChromaDB 0.4.24: REST API. Oracle computes embeddings client-side
  # using @chroma-core/default-embed (all-MiniLM-L6-v2, 384-dim)
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: jellycore-chromadb
    restart: unless-stopped
    # Internal only - no port mapping (accessible via jellycore-internal network)
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_AUTH_TOKEN}
      - CHROMA_AUTH_TOKEN_TRANSPORT_HEADER=Authorization
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=False
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F40 ' /proc/net/tcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - jellycore-internal

  # ========================================
  # Oracle V2 - Knowledge Engine
  # ========================================
  oracle:
    build:
      context: ./oracle-v2
      dockerfile: Dockerfile
    container_name: jellycore-oracle
    restart: unless-stopped
    # Oracle port exposed only on loopback for local debugging
    ports:
      - "127.0.0.1:${ORACLE_HOST_PORT:-47778}:47778"
    volumes:
      - oracle-data:/data/oracle
      # Mount full ψ/memory so indexer + handleLearn can access ψ/memory/learnings, resonance, retrospectives
      - ./oracle-v2/ψ/memory:/data/knowledge/ψ/memory
      - oracle-knowledge-private:/data/knowledge/private
    environment:
      - ORACLE_PORT=47778
      - ORACLE_REPO_ROOT=/data/knowledge
      - ORACLE_DATA_DIR=/data/oracle
      - HF_CACHE_DIR=/data/oracle/transformers-cache
      - CHROMA_URL=http://chromadb:8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN}
      - THAI_NLP_URL=${THAI_NLP_URL:-http://thai-nlp:8000}
      - ORACLE_AUTH_TOKEN=${ORACLE_AUTH_TOKEN}
      - ORACLE_ALLOWED_ORIGINS=${ORACLE_ALLOWED_ORIGINS:-}
      - ORACLE_RATE_LIMIT_WINDOW_MS=${ORACLE_RATE_LIMIT_WINDOW_MS:-60000}
      - ORACLE_RATE_LIMIT_READ_LIMIT=${ORACLE_RATE_LIMIT_READ_LIMIT:-60}
      - ORACLE_RATE_LIMIT_WRITE_LIMIT=${ORACLE_RATE_LIMIT_WRITE_LIMIT:-30}
      - NANOCLAW_EXTERNAL_MCP_DISABLED=${NANOCLAW_EXTERNAL_MCP_DISABLED:-}
      - NODE_ENV=production
    depends_on:
      chromadb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G  # Need 1G+ for ONNX embedding model (all-MiniLM-L6-v2)
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:47778/api/health'); process.exit(r.ok ? 0 : 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - jellycore-internal

  # ========================================
  # Docker Socket Proxy - constrained Docker API surface for NanoClaw
  # ========================================
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: jellycore-docker-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOG_LEVEL=warning
      - PING=1
      - VERSION=1
      - INFO=1
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=1
      - BUILD=1
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - jellycore-internal

  # ========================================
  # NanoClaw - AI Orchestrator (spawns agent containers)
  # ========================================
  nanoclaw:
    build:
      context: .
      dockerfile: Dockerfile.nanoclaw
    container_name: jellycore-nanoclaw
    restart: unless-stopped
    # Give nanoclaw enough time to kill orphan agent containers during shutdown
    stop_grace_period: 45s
    ports:
      - "127.0.0.1:${NANOCLAW_HOST_PORT:-47779}:47779"
    volumes:
      # Agent container image source - mounted so NanoClaw can auto-build nanoclaw-agent:latest on first start
      # (read-only: NanoClaw never needs to write to the build context)
      - ./nanoclaw/container:/app/nanoclaw/container:ro
      # Persistent state (sessions, database, auth)
      - nanoclaw-store:/app/nanoclaw/store
      - nanoclaw-data:/app/nanoclaw/data
      # Codex auth.json from ChatGPT login (required for codex/swarm modes)
      - ./data/codex-auth:/app/nanoclaw/data/codex-auth:ro
      # Optional shared Google Docs MCP token bootstrap
      - ./data/google-docs-auth:/app/nanoclaw/data/google-docs-auth:ro
      # Group workspaces (shared with agent containers via DinD resolveHostPath)
      - ./groups:/app/nanoclaw/groups
    environment:
      # Channels: comma-separated (telegram, whatsapp). Default: telegram only
      - ENABLED_CHANNELS=${ENABLED_CHANNELS:-telegram}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Z.AI GLM Coding Plan - native Anthropic-compatible endpoint
      # https://docs.z.ai/devpack/tool/claude#manual-configuration
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=https://api.z.ai/api/anthropic
      - ANTHROPIC_DEFAULT_SONNET_MODEL=GLM-5
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=GLM-4.7-Flash
      - ANTHROPIC_DEFAULT_OPUS_MODEL=GLM-5
      - API_TIMEOUT_MS=3000000
      # Oracle (containers on jellycore-internal network use DNS name)
      - ORACLE_API_URL=http://oracle:47778
      - ORACLE_AUTH_TOKEN=${ORACLE_AUTH_TOKEN}
      # Oura Ring MCP (optional) - set in .env to enable health/sleep/activity tools
      - OURA_PERSONAL_ACCESS_TOKEN=${OURA_PERSONAL_ACCESS_TOKEN}
      # Google Docs MCP (optional) - OAuth client credentials + optional profile/path override
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_MCP_PROFILE=${GOOGLE_MCP_PROFILE}
      - GOOGLE_DOCS_XDG_CONFIG_HOME=${GOOGLE_DOCS_XDG_CONFIG_HOME}
      # Security
      - JELLYCORE_AUTH_PASSPHRASE=${JELLYCORE_AUTH_PASSPHRASE}
      - JELLYCORE_IPC_SECRET=${JELLYCORE_IPC_SECRET}
      # Misc
      - TZ=${TZ:-Asia/Bangkok}
      - ASSISTANT_NAME=${ASSISTANT_NAME:-Fon}
      - CONTAINER_IMAGE=${CONTAINER_IMAGE:-nanoclaw-agent:latest}
      - AGENT_FULL_ACCESS=${AGENT_FULL_ACCESS:-false}
      - AGENT_CODEX_ENABLED=${AGENT_CODEX_ENABLED:-false}
      - AGENT_SWARM_ENABLED=${AGENT_SWARM_ENABLED:-false}
      - AGENT_MODE_GLOBAL_DEFAULT=${AGENT_MODE_GLOBAL_DEFAULT:-off}
      - LLM_PROVIDER=${LLM_PROVIDER:-claude}
      - NANOCLAW_LLM_PROVIDER=${NANOCLAW_LLM_PROVIDER:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - OPENAI_TIMEOUT_MS=${OPENAI_TIMEOUT_MS:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - OLLAMA_TIMEOUT_MS=${OLLAMA_TIMEOUT_MS:-}
      - CODEX_AUTH_REQUIRED=${CODEX_AUTH_REQUIRED:-true}
      - CODEX_AUTH_PATH=${CODEX_AUTH_PATH:-data/codex-auth}
      - CODEX_MODEL=${CODEX_MODEL:-gpt-5.3-codex}
      - CODEX_EXEC_TIMEOUT_MS=${CODEX_EXEC_TIMEOUT_MS:-600000}
      - NODE_ENV=production
      # Docker network for agent containers to join
      - DOCKER_NETWORK=jellycore_jellycore-internal
      # Docker API client target (via restricted socket proxy)
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      # Health server port
      - NANOCLAW_HEALTH_PORT=47779
      # Agent container resource limits
      - CONTAINER_MEMORY_LIMIT=${CONTAINER_MEMORY_LIMIT:-512m}
      - CONTAINER_CPU_LIMIT=${CONTAINER_CPU_LIMIT:-1.0}
      - MAX_CONCURRENT_CONTAINERS=${MAX_CONCURRENT_CONTAINERS:-2}
    depends_on:
      oracle:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - jellycore-internal

  # Thai NLP sidecar (optional profile)
  thai-nlp:
    build:
      context: ./thai-nlp-sidecar
      dockerfile: Dockerfile
    container_name: jellycore-thai-nlp
    restart: unless-stopped
    profiles: ["thai-nlp"]
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - jellycore-internal

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: jellycore-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - jellycore-internal
    depends_on:
      - alertmanager
      - oracle
      - nanoclaw

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: jellycore-alertmanager
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:${ALERTMANAGER_HOST_PORT:-9093}:9093"
    environment:
      - ALERT_TELEGRAM_BOT_TOKEN=${ALERT_TELEGRAM_BOT_TOKEN:-000000:TEST_TOKEN}
      - ALERT_TELEGRAM_CHAT_ID=${ALERT_TELEGRAM_CHAT_ID:-0}
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - jellycore-internal

  loki:
    image: grafana/loki:3.2.1
    container_name: jellycore-loki
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - jellycore-internal

  promtail:
    image: grafana/promtail:3.2.1
    container_name: jellycore-promtail
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - jellycore-internal
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.2.2
    container_name: jellycore-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
      - grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - jellycore-internal
    depends_on:
      - prometheus
      - loki

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: jellycore-node-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.20'
    networks:
      - jellycore-internal

# ========================================
# Volumes
# ========================================
volumes:
  chromadb-data:
    driver: local
  oracle-data:
    driver: local
  oracle-knowledge-private:
    driver: local
  nanoclaw-store:
    driver: local
  nanoclaw-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  alertmanager-data:
    driver: local

# ========================================
# Networks
# ========================================
networks:
  jellycore-internal:
    driver: bridge
